name: Manual Publish


# This job runs manually when you click it from the Actions page
# You can choose whether to publish the artifact or not, based on the value of the checkbox
on:
  workflow_dispatch:
    inputs:
      runPublish:
        description: "Publish the artifact"
        required: true
        default: true
        type: boolean


env:
  MAVEN_FLAGS: "--no-transfer-progress --batch-mode --update-snapshots"
  MAVEN_PROPERTIES: "-Dmaven.repo.local=${{ github.workspace }}/.m2/repository"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      jars-path: ${{ steps.upload.outputs.artifact-path || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test with Maven
        run: mvn $MAVEN_FLAGS $MAVEN_PROPERTIES clean package

      - name: Upload built jars
        id: upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: maven-jars
          path: '**/target/*.jar'

  publish:
    name: Publish Artifact
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ inputs.runPublish }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          server-id: github # Must match the id in your pom.xml distributionManagement
          settings-path: ${{ github.workspace }} # Location to save the auto-generated settings.xml
          cache: maven

      - name: Download built jars from build job
        uses: actions/download-artifact@v4
        with:
          name: maven-jars
          path: target

      - name: Deploy downloaded jars to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: mvn $MAVEN_FLAGS $MAVEN_PROPERTIES deploy -Dmaven.test.skip=true